name: Daily BDE Score Analysis

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 22:00 CST (Mon-Fri), after US market close
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to analyze'
        required: false
        default: 'ALL'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: hbhqq9/bde-score@main
        id: bde
        with:
          market: ${{ github.event.inputs.market || 'ALL' }}
          min_score: '55'
      
      - name: Save Results
        run: |
          echo '${{ steps.bde.outputs.results }}' > bde_results_$(date +%Y%m%d).json
          
      - uses: actions/upload-artifact@v4
        with:
          name: bde-analysis
          path: bde_results_*.json

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — BDE Score™</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0a0e1a; }
  .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
  .gradient-border { position: relative; }
  .gradient-border::before { content:''; position:absolute; inset:-1px; border-radius:inherit; padding:1px; background:linear-gradient(135deg,rgba(59,130,246,0.3),rgba(168,85,247,0.3),rgba(34,197,94,0.3)); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <a href="/" class="inline-block">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 via-purple-400 to-green-400 bg-clip-text text-transparent">BDE Score™</h1>
    </a>
    <p class="text-slate-500 text-sm mt-2">Welcome back</p>
  </div>

  <!-- Form Card -->
  <div class="glass rounded-2xl p-8 gradient-border">
    <form id="loginForm" class="space-y-5">
      <!-- Email -->
      <div>
        <label class="block text-sm text-slate-400 mb-1.5">Email</label>
        <input type="email" id="email" required placeholder="your@email.com"
          class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-blue-500/50 transition">
      </div>
      <!-- Password -->
      <div>
        <label class="block text-sm text-slate-400 mb-1.5">Password</label>
        <input type="password" id="password" required placeholder="Enter your password"
          class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-blue-500/50 transition">
      </div>
      <!-- Error message -->
      <p id="errorMsg" class="text-red-400 text-sm hidden"></p>
      <!-- Submit -->
      <button type="submit" id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition">
        Sign In
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-white/5"></div>
      <span class="text-slate-600 text-xs">OR</span>
      <div class="flex-1 h-px bg-white/5"></div>
    </div>

    <!-- Links -->
    <p class="text-center text-sm text-slate-400">
      Don't have an account?
      <a href="/register" class="text-blue-400 hover:text-blue-300 transition">Create one</a>
    </p>
  </div>

  <!-- Footer -->
  <div class="text-center mt-6 text-xs text-slate-600">
    <p>
      <a href="/" class="text-slate-500 hover:text-slate-400">← Back to home</a>
    </p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  const btn = document.getElementById('submitBtn');

  errEl.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/dashboard';
    } else {
      errEl.textContent = data.message || 'Login failed';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (err) {
    errEl.textContent = 'Network error. Please try again.';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>

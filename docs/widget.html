<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BDE Score™ Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; }
  .widget { max-width: 600px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .header h2 { font-size: 14px; color: #58a6ff; }
  .header .badge { background: #238636; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
  .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .stock-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; transition: border-color 0.2s; }
  .stock-card:hover { border-color: #58a6ff; }
  .stock-card .symbol { font-weight: 600; font-size: 14px; }
  .stock-card .name { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .stock-card .score { font-size: 24px; font-weight: 700; margin-top: 8px; }
  .stock-card .signal { font-size: 11px; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; }
  .buy { color: #3fb950; } .buy .signal { background: #0d3321; color: #3fb950; }
  .hold { color: #d29922; } .hold .signal { background: #2d2203; color: #d29922; }
  .sell { color: #f85149; } .sell .signal { background: #2d0b0b; color: #f85149; }
  .footer { margin-top: 16px; text-align: center; font-size: 10px; color: #484f58; }
  .footer a { color: #58a6ff; text-decoration: none; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .refresh-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; }
  .refresh-btn:hover { background: #30363d; }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <h2>📊 BDE Score™</h2>
    <span class="badge">LIVE</span>
    <button class="refresh-btn" onclick="loadScores()">↻ Refresh</button>
  </div>
  <div id="content" class="loading">Loading real-time scores...</div>
  <div class="footer">
    Powered by <a href="https://github.com/hbhqq9/bde-score" target="_blank">BDE Score™</a> · 
    EU AI Act Art.50 Compliant · Not financial advice
  </div>
</div>

<script>
const API_BASE = window.location.origin.includes('trycloudflare') 
  ? '' : 'https://bathroom-ebooks-isa-accommodation.trycloudflare.com';

async function loadScores() {
  try {
    const res = await fetch(`${API_BASE}/api/analyze?market=ALL`);
    const data = await res.json();
    const stocks = data.stocks || data;
    
    // Sort by score, show top 12
    const top = stocks.sort((a, b) => (b.bde_score || 0) - (a.bde_score || 0)).slice(0, 12);
    
    let html = '<div class="stock-grid">';
    top.forEach(s => {
      const score = (s.bde_score || 0).toFixed(1);
      const signal = s.signal || 'HOLD';
      const cls = signal === 'BUY' ? 'buy' : signal === 'SELL' ? 'sell' : 'hold';
      html += `
        <div class="stock-card ${cls}">
          <div class="symbol">${s.symbol || '?'}</div>
          <div class="name">${s.name || s.symbol || ''} · ${s.market || ''}</div>
          <div class="score">${score}</div>
          <span class="signal">${signal}</span>
        </div>`;
    });
    html += '</div>';
    document.getElementById('content').innerHTML = html;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading">⚠️ Unable to load scores. API may be temporarily unavailable.</div>`;
  }
}

loadScores();
setInterval(loadScores, 900000); // refresh every 15 min
</script>
</body>
</html>

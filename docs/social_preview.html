<!DOCTYPE html>
<html>
<head>
<style>
body { width: 1280px; height: 640px; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a2a4e 100%); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.title { font-size: 64px; font-weight: 800; text-align: center; margin-bottom: 20px; }
.subtitle { font-size: 28px; opacity: 0.8; text-align: center; margin-bottom: 40px; }
.badges { display: flex; gap: 20px; }
.badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 15px 30px; text-align: center; }
.badge .value { font-size: 36px; font-weight: 700; color: #4ade80; }
.badge .label { font-size: 14px; opacity: 0.6; margin-top: 5px; }
.footer { position: absolute; bottom: 30px; font-size: 18px; opacity: 0.5; }
</style>
</head>
<body>
<div class="title">BDE Score™</div>
<div class="subtitle">Open-Source Multi-Factor Stock Analysis</div>
<div class="badges">
<div class="badge"><div class="value">74</div><div class="label">Stocks</div></div>
<div class="badge"><div class="value">3</div><div class="label">Markets</div></div>
<div class="badge"><div class="value">0-100</div><div class="label">Score Range</div></div>
<div class="badge"><div class="value">Free</div><div class="label">Open Source</div></div>
</div>
<div class="footer">github.com/hbhqq9/bde-score</div>
</body>
</html>
